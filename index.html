<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Save Input UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h3 class="title">🚀 Leads Tracker</h3>

      <input
        type="text"
        placeholder="Paste your link here..."
        class="input-box"
        id="input-box"
      />

      <div class="btn-row">
        <button class="save-btn"> Save</button>
        <button class="save-tab-btn"> Tab</button>
      </div>

      <button class="Delete-btn"> Delete All</button>

      <ul id="un-el"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
